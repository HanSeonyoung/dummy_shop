<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layouts/base}">
<body>
    <div layout:fragment="content">
        <!-- Header-->
        <header class="bg-dark py-5">
            <div class="container px-4 px-lg-5 my-5">
                <div class="text-center text-white">
                    <h1 class="display-4 fw-bolder">Shop in style</h1>
                    <p class="lead fw-normal text-white-50 mb-0">With this shop hompepage template</p>
                </div>
            </div>
        </header>
        <!-- Section-->
        <section class="py-5">
            <div class="container px-4 px-lg-5 mt-5">
                <div class="row gx-4 gx-lg-5 row-cols-2 row-cols-md-3 row-cols-xl-4 justify-content-center">
                    <tr th:each="item : ${goods}">
                        <div class="col mb-5">
                            <div class="card h-100">
                                <!-- Product image-->
                                <a th:href="@{/shop/detail/{id}(id=${item.id})}">
                                    <img class="card-img-top" th:src="${item.image_url}" alt="..." />
                                </a>
                                <!-- Product details-->
                                <div class="card-body p-4">
                                    <div class="text-center">
                                        <!-- Product name-->
                                        <h5 class="fw-bolder" th:text=${item.name}>#상품명</h5>
                                        <!-- Product reviews-->
                                        <div class="d-flex justify-content-center small text-warning mb-2">
                                            <div class="bi-star-fill"></div>
                                            <div class="bi-star-fill"></div>
                                            <div class="bi-star-fill"></div>
                                            <div class="bi-star-fill"></div>
                                            <div class="bi-star-fill"></div>
                                        </div>
                                        <!-- Product price-->
                                        <span th:text="'$ ' + ${item.price}">#가격</span>
                                    </div>
                                </div>
                                <!-- Product actions-->
                                <div class="card-footer p-4 pt-0 border-top-0 bg-transparent">
                                        <div class="text-center">
                                            <form action="/cart/add" method="post">
                                                <input type="hidden" name="productId" th:value="${item.id}" />
                                                <button type="submit" class="btn btn-outline-dark mt-auto">Add to cart
                                                </button>
                                            </form>
                                        </div>
                                </div>
                            </div>
                        </div>
                    </tr>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
